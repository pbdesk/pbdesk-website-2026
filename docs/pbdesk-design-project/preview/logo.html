<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css?v=7">
<style>
body{margin:0;padding:32px;background:var(--bg-page);font-family:var(--font-sans);}
.row{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start;}
.card{
  border:1px solid var(--border-subtle);
  border-radius:16px;
  background:var(--bg-elevated);
  padding:22px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:220px;min-height:170px;gap:12px;
}
.card.dark{background:#0B0F17;border-color:#1F2937;}
.card img.wordmark{height:56px;width:auto;display:block;object-fit:contain;}
.label{font-size:11px;color:var(--fg-muted);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.08em;text-align:center;}
.card.dark .label{color:#9CA3AF;}

/* Rounded-square avatar with brand mark (illustrated) */
.av-sq{
  width:104px;height:104px;border-radius:28px;
  background:linear-gradient(135deg, rgb(37 99 235 / 0.18), rgb(14 165 233 / 0.18));
  border:1px solid var(--border-subtle);
  display:flex;align-items:flex-end;justify-content:center;
  overflow:hidden;
}
.av-sq img{width:92%;transform:translateY(4%);}

/* Circular portrait — primary brand avatar */
.av-round{
  width:104px;height:104px;border-radius:50%;
  overflow:hidden;
  border:3px solid var(--brand-600);
  box-shadow:0 0 0 3px rgb(37 99 235 / 0.15), var(--shadow-md);
  background:var(--bg-elevated);
}
.av-round img{width:100%;height:100%;object-fit:cover;display:block;}

/* Small circular (nav/inline use) */
.av-sm{
  width:44px;height:44px;border-radius:50%;overflow:hidden;
  border:2px solid var(--brand-600);
}
.av-sm img{width:100%;height:100%;object-fit:cover;display:block;}
</style></head><body>

<div class="row">
  <div class="card">
    <img class="wordmark" src="../assets/logo-light.png" alt="PBDesk (light)">
    <span class="label">wordmark · light</span>
  </div>
  <div class="card dark">
    <img class="wordmark" src="../assets/logo-dark.png" alt="PBDesk (dark)">
    <span class="label">wordmark · dark</span>
  </div>
  <div class="card">
    <div class="av-round"><img src="../assets/pb-sq1.jpg" alt="Pinal"></div>
    <span class="label">circular · 104px<br>pb-sq1.jpg</span>
  </div>
  <div class="card">
    <div class="av-round"><img src="../assets/pb-sq2.jpg" alt="Pinal alt"></div>
    <span class="label">circular · variant 2</span>
  </div>
  <div class="card">
    <div class="av-round"><img src="../assets/pb-sq3.jpg" alt="Pinal alt 3"></div>
    <span class="label">circular · variant 3</span>
  </div>
  <div class="card">
    <div class="av-sm"><img src="../assets/pb-sq1.jpg" alt="Pinal"></div>
    <span class="label">circular · 44px inline</span>
  </div>
  <div class="card">
    <div class="av-sq"><img src="../assets/pb-logo.png" alt="Avatar mark"></div>
    <span class="label">rounded-square mark</span>
  </div>
</div>

</body></html>
