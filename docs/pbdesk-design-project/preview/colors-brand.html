<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css?v=6">
<style>
body{margin:0;padding:24px;background:var(--bg-page);}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
.sw{height:72px;border-radius:10px;border:1px solid var(--border-subtle);display:flex;align-items:flex-end;padding:8px;color:white;font-size:11px;font-weight:600;font-family:var(--font-mono);}
.sw.light{color:var(--zinc-900);}
.label{font-size:11px;color:var(--fg-muted);margin-top:6px;font-family:var(--font-mono);}
</style></head><body>
<div class="grid">
<div><div class="sw" style="background:#EFF6FF;color:#1E3A8A">50</div><div class="label">#EFF6FF</div></div>
<div><div class="sw" style="background:#BFDBFE;color:#1E3A8A">200</div><div class="label">#BFDBFE</div></div>
<div><div class="sw" style="background:#60A5FA">400</div><div class="label">#60A5FA</div></div>
<div><div class="sw" style="background:#2563EB">600 ★</div><div class="label">#2563EB primary</div></div>
<div><div class="sw" style="background:#1E3A8A">900</div><div class="label">#1E3A8A</div></div>
</div>
</body></html>
