<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;background:var(--bg-page);display:flex;gap:10px;flex-wrap:wrap;font-family:var(--font-sans);}
.chip{padding:7px 14px;border-radius:9999px;background:var(--bg-elevated);border:1px solid var(--border-subtle);font-size:13px;color:var(--fg-secondary);display:inline-flex;align-items:center;gap:8px;}
.dot{width:6px;height:6px;border-radius:50%;background:#7C3AED;}
.brand{background:rgba(124,58,237,0.08);color:#7C3AED;border-color:rgba(124,58,237,0.25);}
.solid{background:#7C3AED;color:white;border-color:#7C3AED;}
.cat{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:#7C3AED;}
</style></head><body>
<span class="chip"><span class="dot"></span>JavaScript</span>
<span class="chip">TypeScript</span>
<span class="chip brand">Bits &amp; Bites</span>
<span class="chip solid">Featured</span>
<span class="cat">Bits / AI</span>
</body></html>
