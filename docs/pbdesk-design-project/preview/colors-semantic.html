<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--bg-page);}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.sw{height:64px;border-radius:10px;border:1px solid var(--border-subtle);display:flex;align-items:flex-end;padding:8px;color:white;font-size:11px;font-weight:600;font-family:var(--font-mono);}
.label{font-size:11px;color:var(--fg-muted);margin-top:6px;font-family:var(--font-mono);}
</style></head><body>
<div class="grid">
<div><div class="sw" style="background:#0EA5E9">accent</div><div class="label">#0EA5E9 sky</div></div>
<div><div class="sw" style="background:#10B981">success</div><div class="label">#10B981</div></div>
<div><div class="sw" style="background:#F59E0B">warning</div><div class="label">#F59E0B</div></div>
<div><div class="sw" style="background:#EF4444">danger</div><div class="label">#EF4444</div></div>
</div>
</body></html>
