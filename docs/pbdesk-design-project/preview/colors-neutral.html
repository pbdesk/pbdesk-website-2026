<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--bg-page);}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.sw{height:64px;border-radius:10px;border:1px solid var(--border-subtle);display:flex;align-items:flex-end;padding:6px;color:white;font-size:10px;font-family:var(--font-mono);font-weight:600;}
.sw.lt{color:#18181B;}
.label{font-size:10px;color:var(--fg-muted);margin-top:4px;font-family:var(--font-mono);}
</style></head><body>
<div class="grid">
<div><div class="sw lt" style="background:#FAFAFA">50</div><div class="label">50</div></div>
<div><div class="sw lt" style="background:#E4E4E7">200</div><div class="label">200</div></div>
<div><div class="sw" style="background:#71717A">500</div><div class="label">500</div></div>
<div><div class="sw" style="background:#3F3F46">700</div><div class="label">700</div></div>
<div><div class="sw" style="background:#18181B">900</div><div class="label">900</div></div>
<div><div class="sw" style="background:#0B0F17">950</div><div class="label">950</div></div>
</div>
</body></html>
